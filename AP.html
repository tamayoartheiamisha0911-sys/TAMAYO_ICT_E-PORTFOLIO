<!DOCTYPE html>
<html>
<head>
  <title> AP </title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Corbel, sans-serif;
    }

    body {
      background-color: #ECDFCD;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color:#442F2A;
    }

    .scroll-wrapper {
      position: relative;
    }

    /* Container for horizontal scroll */
    .card-container {
      display: flex;
      overflow-x: auto;
      gap: 20px;
      padding: 10px 0;
      scroll-behavior: smooth;
      scroll-snap-type: x mandatory;
    }

    .card-container::-webkit-scrollbar {
      display: none;
    }

    /* Card styling */
    .card {
      flex: 0 0 auto;
      width: 300px; /* Slightly wider to fit 2 images */
      background-color: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      overflow: hidden;
      transition: transform 0.3s;
      cursor: pointer;
      scroll-snap-align: start;
    }

    .card:hover {
      transform: scale(1.05);
    }

    /* Two images side by side */
    .card-images {
      display: flex;
    }

    .card-images img {
      width: 50%;
      height: 150px;
      object-fit: cover;
    }

    .card-content {
      padding: 15px;
    }

    .card-content h3 {
      margin-bottom: 10px;
      font-size: 18px;
    }

    .card-content p {
      font-size: 14px;
      color:#442F2A;
    }

    /* Arrow buttons */
    .scroll-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background-color: rgba(0,0,0,0.5);
      color: white;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .scroll-left {
      left: 0;
    }

    .scroll-right {
      right: 0;
    }

    .scroll-btn:hover {
      background-color: rgba(0,0,0,0.7);
    }

    @media (max-width: 600px) {
      .card {
        width: 240px;
      }
      .card-content h3 {
        font-size: 16px;
      }
      .card-content p {
        font-size: 12px;
      }
    }

.links a{
  text-decoration:none;
  color:white;
  background:rgba(0,0,0,0.6);
  padding:12px 25px;
  margin:10px;
  border-radius:8px;
  font-size:18px;
  display:inline-block;
  transition:0.3s;
}

.links a:hover{
  background:white;
  color:black;
}

  </style>
</head>
<body>

  <script>
    const container = document.getElementById('cardContainer');
    const btnLeft = document.querySelector('.scroll-left');
    const btnRight = document.querySelector('.scroll-right');

    btnLeft.addEventListener('click', () => {
      container.scrollBy({ left: -320, behavior: 'smooth' }); // width + gap
